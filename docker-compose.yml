version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: steward_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: steward
      POSTGRES_PASSWORD: steward_dev
      POSTGRES_DB: steward_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: steward_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://steward:steward_dev@postgres:5432/steward_dev
      NODE_ENV: development
      JWT_SECRET: change_me_in_production
      PORT: 3001
    ports:
      - '3001:3001'
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      - postgres
    command: npm run start:dev

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: steward_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NODE_ENV: development
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    container_name: steward_ingestion
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://steward:steward_dev@postgres:5432/steward_dev
      PORT: 8000
    ports:
      - '8000:8000'
    volumes:
      - ./services/ingestion:/app
    depends_on:
      - postgres

volumes:
  postgres_data:
