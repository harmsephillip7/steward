# Railway build config for NestJS API in an npm workspace monorepo
# In Railway dashboard: set Root Directory to "/" for the @steward/api service

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npx tsc -p packages/shared/tsconfig.json", "cd apps/api && npx nest build"]

[start]
cmd = "cd apps/api && node dist/main"
